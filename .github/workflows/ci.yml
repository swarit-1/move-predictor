name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: ML Service
            working-directory: ml
          - name: Backend
            working-directory: backend
          - name: Frontend
            working-directory: frontend

    name: ${{ matrix.name }}
    defaults:
      run:
        working-directory: ${{ matrix.working-directory }}

    steps:
      - uses: actions/checkout@v4

      # Python setup (ML service only)
      - name: Set up Python
        if: matrix.working-directory == 'ml'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ML dependencies
        if: matrix.working-directory == 'ml'
        run: pip install -e ".[dev]"

      - name: Lint Python
        if: matrix.working-directory == 'ml'
        run: ruff check src/ tests/

      - name: Test ML
        if: matrix.working-directory == 'ml'
        run: pytest tests/ -v --tb=short

      # Node setup (Backend + Frontend)
      - name: Set up Node.js
        if: matrix.working-directory != 'ml'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ matrix.working-directory }}/package-lock.json

      - name: Install dependencies
        if: matrix.working-directory != 'ml'
        run: npm ci

      - name: Type check
        if: matrix.working-directory != 'ml'
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build
        if: matrix.working-directory == 'frontend'
        run: npx vite build

      - name: Build backend
        if: matrix.working-directory == 'backend'
        run: npx tsc

      - name: Test backend
        if: matrix.working-directory == 'backend'
        run: npm test
        continue-on-error: true
